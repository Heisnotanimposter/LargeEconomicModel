# LEM Infrastructure - Nginx
# Optimized for SSL/HTTP2, reverse proxy to api-lem and web-lem

events {
    worker_connections 1024;
}

http {
    # HTTP/2, SSL-ready
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream lem_api {
        server api-lem:8000;
    }

    upstream lem_web {
        server web-lem:3000;
    }

    server {
        listen 80;
        server_name localhost;

        # LEM Engine API
        location /api/ {
            proxy_pass http://lem_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # OpenAPI / health
        location ~ ^/(docs|redoc|openapi\.json|health)$ {
            proxy_pass http://lem_api;
            proxy_set_header Host $host;
        }

        # LEM Command Center (Next.js)
        location / {
            proxy_pass http://lem_web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # SSL/HTTP2 (uncomment and configure for production)
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ... (same location blocks)
    # }
}
